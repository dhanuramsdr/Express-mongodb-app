sonar.projectKey=Express-mongodb-app
sonar.organization=dhanuramsdr
sonar.projectName=Express-mongodb-app
sonar.projectVersion=1.0

# Source and test directories
sonar.sources=src
sonar.tests=tests

# File suffixes
sonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx

# IMPORTANT: Define language patterns to resolve conflict
sonar.lang.patterns.ts=**/*.ts,**/*.tsx
sonar.lang.patterns.js=**/*.js,**/*.jsx

# Exclusions
sonar.exclusions=node_modules/**,dist/**,coverage/**,.git/**,**/*.test.ts,**/*.spec.ts
sonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,**/__tests__/**,**/server.ts,**/index.ts

# TypeScript configuration
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Source encoding
sonar.sourceEncoding=UTF-8