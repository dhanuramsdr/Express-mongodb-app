name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  # These are public values (can be visible)
  DOCKER_TAG: latest
  # Use GitHub Variables for non-secret values (Settings -> Secrets and variables -> Actions -> Variables)
  DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE || 'your-dockerhub-username/express-ts-mongodb-api' }}
  SONAR_PROJECT: ${{ vars.SONAR_PROJECT || 'express-ts-mongodb-api' }}

jobs:
  # Code Quality & Security Scan
  sonarqube:
    name: SonarQube Code Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests with coverage
        run: npm test

      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.projectKey=${{ env.SONAR_PROJECT }}
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.javascript.file.suffixes=.ts,.tsx
            -Dsonar.coverage.exclusions=**/*.test.ts,**/__tests__/**,**/server.ts

  # Code Review & Linting
  code-review:
    name: Code Review & Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Linting
        run: npm run lint

      - name: Check Formatting
        run: npm run format -- --check

      - name: Type Checking
        run: npx tsc --noEmit

      - name: Security Audit
        run: npm audit --audit-level=moderate

      - name: Dependency Check
        run: |
          npm outdated || true

  # Unit & Integration Tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [code-review]
    strategy:
      matrix:
        node-version: [18, 20]

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Create env file
        run: |
          echo "NODE_ENV=test" > .env.test
          echo "MONGODB_URI=mongodb://localhost:27017/test" >> .env.test

      - name: Run tests
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-node${{ matrix.node-version }}
          path: coverage/

      - name: Run Integration Tests
        run: |
          npm run build
          NODE_ENV=test node dist/server.js &
          sleep 5
          npm run test:integration || true

  # Build Application
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build TypeScript
        run: npm run build

      - name: Verify build
        run: |
          ls -la dist/
          test -f dist/server.js || exit 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # Docker Build & Push
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [build, sonarqube]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{date 'YYYYMMDD'}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_VERSION=20
            BUILD_DATE=${{ github.event.repository.updated_at }}

  # Security Scan on Docker Image
  docker-security:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ vars.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
